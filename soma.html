<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabuada de Soma</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container{
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        width: 350px;
        text-align: center;
    }

    h1{
        color: #333;
    }

    input{
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button{
        width: 100%;
        padding: 10px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover{
        background: #0056b3;
    }

    #resultado{
        margin-top: 20px;
        text-align: left;
    }

    .linha{
        padding: 5px;
        border-bottom: 1px solid #eee;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Tabuada de Soma</h1>

    <input type="number" id="numero" placeholder="Digite um número">

    <button onclick="gerarTabuada()">Gerar Tabuada</button>

    <div id="resultado"></div>
</div>

<script src="script.js"></script>

</body>
</html>
